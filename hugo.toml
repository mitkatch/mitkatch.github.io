baseURL = "https://mitkatch.github.io/"
languageCode = "en-us"
title = "HVAC-Vibe"
theme = "PaperMod"


enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Embedded systems, IIoT, and hardware engineering"
  author = "Mikhail"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  defaultTheme = "auto"

[services]
  [services.googleAnalytics]
    ID = ""

[params.homeInfoParams]
  Title = "HVAC-Vibe"
  Content = "Embedded systems, passive SAW sensing, and IIoT monitoring"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/mitkatch"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = true
  style = "monokai"
  codeFences = true
  guessSyntax = true

[pagination]
  pagerSize = 10

[[menu.main]]
  name = "Architecture"
  url = "/architecture/"
  weight = 10

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 20

[[menu.main]]
  name = "Dashboard"
  url = "/dashboard/"
  weight = 30
  