baseURL = "https://mitkatch.github.io/"
languageCode = "en-us"
title = "HVAC-Vibe"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Embedded systems, IIoT, and hardware engineering"
  author = "Mikhail"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  defaultTheme = "auto"

[services]
  [services.googleAnalytics]
    ID = ""
    
[params.homeInfoParams]
  Title = "HVAC-Vibe"
  Content = "Embedded systems, passive SAW sensing, and IIoT monitoring"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/mitkatch"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false